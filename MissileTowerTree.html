<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Missile Tower 강화 트리</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 40px 20px; }
  h1 { color: #fff; font-size: 20px; margin-bottom: 40px; letter-spacing: 1px; font-weight: 300; }
  .lines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  .node {
    position: absolute; width: 140px; border-radius: 8px; padding: 12px 10px;
    text-align: center; display: block;
    background: #1a1a1a; border: 1px solid #444;
    transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
  }
  .node:hover { transform: scale(1.06); border-color: #ccc; box-shadow: 0 0 12px rgba(255,255,255,0.12); }
  .node .level { font-size: 10px; color: #888; font-weight: bold; margin-bottom: 4px; letter-spacing: 1px; }
  .node .name  { font-size: 12px; color: #fff; }
  .node .stats { font-size: 9px; margin-top: 6px; color: #666; line-height: 1.5; }
  .tree-wrap { position: relative; width: 500px; height: 400px; }
  .node-base { left: 180px; top: 0; border-color: #888; }
  .node-1a   { left: 30px;  top: 160px; }
  .node-1b   { left: 330px; top: 160px; }
  .node-2a   { left: 30px;  top: 320px; }
  .node-2b   { left: 330px; top: 320px; }
  .legend { display: flex; gap: 32px; margin-top: 32px; }
  .legend-item { font-size: 11px; color: #555; }
</style>
</head>
<body>
<h1>Missile Tower — 강화 트리</h1>
<div class="tree-wrap">
  <svg class="lines" viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
    <line x1="250" y1="80" x2="100" y2="160" stroke="#444" stroke-width="1.5" stroke-dasharray="5,4"/>
    <line x1="250" y1="80" x2="400" y2="160" stroke="#444" stroke-width="1.5" stroke-dasharray="5,4"/>
    <line x1="100" y1="240" x2="100" y2="320" stroke="#333" stroke-width="1.5" stroke-dasharray="5,4"/>
    <line x1="400" y1="240" x2="400" y2="320" stroke="#333" stroke-width="1.5" stroke-dasharray="5,4"/>
  </svg>
  <div class="node node-base">
    <div class="level">강화 0</div>
    <div class="name">Bomb Tower</div>
    <div class="stats">DMG 3.0 · 1.5s · DPS 2.0</div>
  </div>
  <div class="node node-1a">
    <div class="level">강화 1A</div>
    <div class="name">Missile Tower</div>
    <div class="stats">DMG 10.0 · 2.0s · DPS 5.0</div>
  </div>
  <div class="node node-1b">
    <div class="level">강화 1B</div>
    <div class="name">Homing Missile</div>
    <div class="stats">DMG 5.0 · 1.0s · DPS 5.0</div>
  </div>
  <div class="node node-2a">
    <div class="level">강화 2A</div>
    <div class="name">강화 Missile</div>
    <div class="stats">DMG 20.0 · 2.0s · DPS 10.0</div>
  </div>
  <div class="node node-2b">
    <div class="level">강화 2B</div>
    <div class="name">강화 Homing</div>
    <div class="stats">DMG 10.0 · 1.5s · DPS 13.3</div>
  </div>
</div>
<div class="legend">
  <div class="legend-item">1A 계열 → 강화 2A</div>
  <div class="legend-item">1B 계열 → 강화 2B</div>
</div>
</body>
</html>
